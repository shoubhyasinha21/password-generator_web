<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Password Generator</h1>
    <p>Create a strong and secure password</p>

    <div class="result-box">
      <input type="text" id="password" readonly placeholder="Generated password" />
      <button onclick="copyPassword()">Copy</button>
    </div>

    <div class="settings">
      <label>
        Password Length
        <input type="number" id="length" min="4" max="30" value="12" />
      </label>

      <label>
        <input type="checkbox" id="uppercase" checked />
        Include Uppercase Letters
      </label>

      <label>
        <input type="checkbox" id="lowercase" checked />
        Include Lowercase Letters
      </label>

      <label>
        <input type="checkbox" id="numbers" checked />
        Include Numbers
      </label>

      <label>
        <input type="checkbox" id="symbols" checked />
        Include Special Characters
      </label>
    </div>

    <button class="generate-btn" onclick="generatePassword()">
      Generate Password
    </button>

    <p id="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
